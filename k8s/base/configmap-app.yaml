apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_ENV: dev
  DEV: "true"
  POSTGRES_DB: database
  POSTGRES_USER: postgres
  DATABASE_HOST: database-service
  DATABASE_PORT: "5432"
  REACT_APP_API_ORDERS: /orders
  REACT_APP_API_PRODUCTS: /products
  runtime-config.js: |
    window.__APP_CONFIG__ = (() => {
      const host = window.location.hostname || "localhost";
      const isIngressHost = host.endsWith(".devops.local");
      return {
        API_ORDERS: isIngressHost ? "/orders" : `http://${host}:30050`,
        API_PRODUCTS: isIngressHost ? "/products" : `http://${host}:30070`
      };
    })();
